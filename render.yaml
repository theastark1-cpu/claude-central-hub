services:
  - type: web
    name: capital-tracker-api
    runtime: python
    rootDir: capital-tracker/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./capital_tracker.db
      - key: PYTHON_VERSION
        value: "3.11"
